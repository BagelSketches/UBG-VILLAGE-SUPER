<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UBG-Village-Pro</title>
<link rel="icon" type="image/png" href="icon128.png">

<style>
  /* --- CUSTOM PROPERTIES & ACCENTS --- */
  :root {
    --accent: #00ff00;
    --bgGlow: rgba(0,255,0,0.3);
    --dark-bg: #0a0a0a;
    --card-bg: rgba(0,255,0,0.05); /* Lighter background for game cards */
  }

  /* --- BASE & UTILITY --- */
  body {
    margin: 0;
    background: var(--dark-bg);
    color: white;
    font-family: 'Consolas', 'Monospace', sans-serif; /* Hacker-style font */
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  /* DARK OVERLAY (IMPROVE READABILITY) */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: -1;
  }
  
  /* MATRIX CANVAS */
  #matrix {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -2; /* Put behind the overlay */
  }
  
  /* --- CUSTOM CURSOR STYLES --- */
  /* Hide default cursor */
  * {
    cursor: none !important;
  }

  /* NEW CSS for cursor toggle: Re-enables system cursor and hides custom cursor */
  body.system-cursor * {
    cursor: default !important; 
  }

  body.system-cursor #customCursor {
    display: none !important; 
  }

  /* The actual custom cursor element */
  #customCursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    /* Border is solid color defined by --accent */
    border: 2px solid var(--accent); 
    /* Ensure the inside is transparent by default */
    background-color: transparent; 
    pointer-events: none; /* Allows clicks to pass through to elements below */
    transform: translate(-50%, -50%); /* Centers the cursor on the mouse point */
    transition: all 0.1s ease-out; /* Smooth follow/hover effect */
    z-index: 10002; /* Always on top */
  }

  /* Hover effect for buttons/links/interactive elements */
  button:hover ~ #customCursor, 
  a:hover ~ #customCursor, 
  select:hover ~ #customCursor, 
  input:hover ~ #customCursor {
    /* Larger, filled, and glowing on hover */
    width: 30px;
    height: 30px;
    /* Use an rgba background to keep the fill translucent (0.9 opacity) */
    background-color: var(--bgGlow); 
    border-width: 1px;
    opacity: 1; /* Ensure border remains solid */
    box-shadow: 0 0 10px var(--accent);
  }
  
  /* --- NAVIGATION BAR --- */
  #navbar {
    position: sticky;
    top: 0;
    width: 98%;
    background: rgba(0, 0, 0, 0.9);
    border-bottom: 2px solid var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 30px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    z-index: 1000;
  }

  #navbar-title {
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
    text-shadow: 0 0 5px var(--bgGlow);
  }

  #navbar-links button, #navbar-links a {
    background: none;
    border: none;
    color: var(--accent);
    padding: 8px 15px;
    margin-left: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.2s, text-shadow 0.2s;
  }
  
  #navbar-links button:hover, #navbar-links a:hover {
    color: white;
    text-shadow: 0 0 8px var(--accent);
  }
  
  /* --- SPLASH SCREEN (REMOVED) --- */
  /* This block is no longer needed as the splash screen is removed */
  
  /* --- MAIN CONTENT & GAME GRID --- */
  #mainContent {
    max-width: 1200px;
    margin: 20px auto;
    padding: 30px;
    display: block; /* **MODIFIED: Now visible by default** */
  }

  .site-logo {
    display: block;
    margin: 0 auto 15px;
    width: 400px;
    max-width: 90%;
    height: auto;
    filter: drop-shadow(0 0 10px var(--accent));
  }
  
  /* Headers for Favorites and Recents */
  #favoritesHeader,
  #recentlyPlayedHeader {
    opacity: 0;
    transition: opacity 0.3s ease;
    color: var(--accent);
    margin-top: 30px;
    margin-bottom: 10px; /* NEW: Added margin-bottom for better header separation */
  }
  
  #favoritesHeader.visible,
  #recentlyPlayedHeader.visible {
    opacity: 1;
  }

  #randomGameBtn {
    background: var(--dark-bg);
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 10px var(--bgGlow);
    transition: 0.2s;
  }

  #randomGameBtn:hover {
    background: var(--card-bg);
    box-shadow: 0 0 15px var(--bgGlow);
  }

  #searchBar {
    width: 100%;
    max-width: 420px;
    display: block;
    margin: 20px auto 10px; /* Reduced bottom margin */
    padding: 12px;
    border-radius: 10px;
    font-size: 16px;
    border: 2px solid var(--accent);
    outline: none;
    text-align: center;
    background: rgba(0,0,0,0.9);
    color: white;
    transition: 0.2s;
    box-shadow: 0 0 8px var(--bgGlow);
  }
  
  /* Category Filter Buttons */
  #categoryFilters button {
    background: var(--dark-bg);
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
    margin: 5px;
    transition: 0.2s;
  }
  #categoryFilters button.active, #categoryFilters button:hover {
    background: var(--accent);
    color: var(--dark-bg);
    box-shadow: 0 0 5px var(--bgGlow);
  }
  #noResultsMessage {
    color: #ff5555;
    text-align: center;
    padding: 20px;
    display: none;
  }

  .game-buttons {
    display: grid;
    /* MODIFIED: Set to exactly 5 columns with equal width on large screens */
    grid-template-columns: repeat(5, 1fr); 
    gap: 20px;
    margin-top: 25px;
  }
  
  /* NEW CSS for spacing fix */
  #favoriteGames,
  #recentlyPlayed {
      margin-bottom: 40px; 
  }


  .game-buttons button {
    background: var(--card-bg);
    color: var(--accent);
    border: 1px solid var(--accent);
    /* MODIFIED: Increased padding for bigger buttons */
    padding: 20px 15px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    font-weight: 600;
    box-shadow: 0 0 8px var(--bgGlow);
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    /* MODIFIED: Increased min-height for bigger buttons */
    min-height: 180px; 
    position: relative; 
  }
  
  /* Favorite Button Styling */
  .favorite-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: none;
      border: none;
      color: #777; /* Default color: Grey/unfavorited */
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 5px;
      z-index: 5; /* Above the image/text */
      transition: color 0.2s, text-shadow 0.2s;
      outline: none;
  }
  
  .favorite-btn:hover {
      color: yellow; 
      text-shadow: 0 0 2px rgba(255, 255, 0, 0.5);
  }
  
  .favorite-btn.active {
      color: var(--accent); /* Theme color when favorited */
      text-shadow: 0 0 5px var(--bgGlow);
  }

  .game-buttons button:hover {
    background: rgba(0, 255, 0, 0.15);
    box-shadow: 0 0 15px var(--bgGlow);
    transform: translateY(-2px);
  }

  .game-buttons img {
    /* MODIFIED: Increased size of game icon */
    width: 80px;
    height: 80px;
    display: block;
    margin-bottom: 10px;
    border-radius: 8px;
    object-fit: cover;
  }
  
  /* GAME OVERLAY */
  #gameOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    display: none;
    flex-direction: column;
    z-index: 9999;
  }

  #topBar { /* Game Overlay Top Bar */
    width: 98%;
    height: 50px;
    background: #111;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 15px;
    border-bottom: 2px solid var(--accent);
  }

  #topBar button {
    background: black;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 8px 14px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
    margin-left: 5px; /* Added spacing between buttons */
  }

  #topBar button:hover {
    background: var(--accent);
    color: black;
  }
  
  /* Specific style for the panic button for quick visual distinction */
  #panicButton {
    background: #ff0000 !important;
    border-color: #ff0000 !important;
    color: white !important;
    font-weight: bold;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
  }
  
  #panicButton:hover {
    background: #cc0000 !important;
    color: white !important;
  }

  /* Loading Indicator */
  #loadingIndicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--accent);
    font-size: 2em;
    font-weight: bold;
    display: none;
    z-index: 10000;
  }
  
  #gameFrame {
    width: 100%;
    height: calc(100vh - 82px); /* Adjusted height for the topBar */
    border: none;
  }

  /* --- Settings Modal/Panel (Existing) --- */
  #settingsModal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      border: 3px solid var(--accent);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 25px var(--bgGlow);
      z-index: 10001;
      display: none;
      width: 300px;
      color: white;
  }
  
  /* --- Game Details Modal (NEW) --- */
  #gameDetailsModal {
      position: fixed;
      z-index: 10001;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.85); /* Dark background */
      display: none; /* Hidden by default */
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
  }
  
  .modal-content {
      background: rgba(0, 0, 0, 0.95);
      border: 3px solid var(--accent);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 25px var(--bgGlow);
      width: 80%;
      max-width: 600px;
      position: relative;
      color: white;
  }

  .modal-body {
      max-height: 400px;
      overflow-y: auto;
      padding-right: 15px; 
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 15px;
  }
  
  .close-btn {
      color: var(--accent);
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      line-height: 1;
  }
  
  .close-btn:hover,
  .close-btn:focus {
      color: white;
      text-shadow: 0 0 5px var(--accent);
      text-decoration: none;
  }
  
  #modalLaunchBtn {
      /* Style to match settings button but more prominent */
      background: var(--accent);
      color: var(--dark-bg);
      border: 2px solid var(--accent);
      padding: 12px 20px;
      border-radius: 10px;
      width: 100%;
      font-weight: bold;
      transition: all 0.2s;
  }
  
  #modalLaunchBtn:hover {
      background: var(--dark-bg);
      color: var(--accent);
      box-shadow: 0 0 10px var(--bgGlow);
  }


  #settingsModal h2 {
      color: var(--accent);
      margin-top: 0;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 10px;
  }
  .setting-group {
      margin-bottom: 20px;
  }
  .setting-group label, .setting-group select {
      display: block;
      margin-top: 5px;
  }
  
  /* Correctly scoped CSS for buttons, select, AND color picker/text input in settings modal */
  #settingsModal select, 
  #settingsModal button, 
  #settingsModal input[type="color"],
  #settingsModal input[type="text"] { /* ADDED text input */
      background: var(--dark-bg);
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 8px;
      width: 100%;
      box-sizing: border-box; /* Ensures padding is inside the width */
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s, color 0.2s;
  }
  
  /* Ensure the text input is still input-style when not hovered */
  #settingsModal input[type="text"] {
    cursor: text;
  }


  /* Specific styling for the color input to make the swatch visible and styled */
  #settingsModal input[type="color"] {
    height: 40px; /* Make it a decent size for the swatch */
    padding: 2px;
  }
  /* Webkit-specific styling for the color swatch */
  #settingsModal input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
  }
  #settingsModal input[type="color"]::-webkit-color-swatch {
      border: 1px solid var(--dark-bg); /* Use a darker border for contrast */
      border-radius: 5px;
  }

  #settingsModal button:hover {
    background: var(--accent);
    color: var(--dark-bg);
  }

  /* MEDIA QUERIES for smaller screens */
  @media (max-width: 768px) {
    #navbar {
      padding: 10px 15px;
      flex-direction: column;
    }
    #navbar-links {
      margin-top: 10px;
    }
    #navbar-title {
      font-size: 20px;
    }
    /* Removed splash screen specific media queries */
    .game-buttons {
      /* Scales down grid for mobile */
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
    }
  }

</style>
</head>

// NEW FUNCTION: Shows the game details modal
function showGameDetails(url) {
    // EXCLUSIONS (OPEN NORMALLY) - Check if URL is an external link
    if (
        url.includes("discord.gg") ||
        url.includes("discord.com") ||
        url.includes("docs.google.com") ||
        url.includes("chatroom.html")
    ) {
        window.open(url, "_blank");
        return;
    }

    // Get the button data for name/image from the main grid
    let btn = [...document.querySelectorAll("#allGamesGrid button")]
                .find(b => b.getAttribute("data-url") === url);

    // Get game details from the dedicated object or use defaults
    const details = gameDetails[url] || { 
        // Use the innerText of the button if available, otherwise 'Game'
        description: "Description not available. This game is provided as-is.", 
        controls: "Controls may vary. Try using Arrow Keys, WASD, and Mouse/Click." 
    };
    
    // Extract the name cleanly
    let gameName = btn ? btn.innerText.trim().replace(/^Launch_/, '').replace(/_/g, ' ').trim() : 'Game Title';


    // Update modal content
    document.getElementById("modalGameTitle").innerText = gameName;
    document.getElementById("modalGameDescription").innerText = details.description;
    document.getElementById("modalGameControls").innerText = details.controls;
    
    // Update launch button to call the new launchGame function with the correct URL
    document.getElementById("modalLaunchBtn").setAttribute("onclick", `launchGame('${url}')`);

    // Show modal
    document.getElementById("gameDetailsModal").style.display = "flex";
}

// NEW FUNCTION: Closes the game details modal
function closeGameDetailsModal() {
    document.getElementById("gameDetailsModal").style.display = "none";
}

// NEW FUNCTION: Launches the game in the iframe (old openGame logic)
function launchGame(url) {
    // 1. Close the Details Modal
    closeGameDetailsModal(); 
    
    // --- NEW: Custom Cursor Disable Logic ---
    // 1. Store the user's current preference before overriding it
    wasCursorEnabledBeforeGame = localStorage.getItem("customCursorEnabled") !== "false";

    // 2. Force system cursor for game by adding the system-cursor class
    document.body.classList.add("system-cursor");
    // ----------------------------------------


    let overlay = document.getElementById("gameOverlay");
    let frame = document.getElementById("gameFrame");
    let loadingIndicator = document.getElementById("loadingIndicator");

    // OPEN OVERLAY
    overlay.style.display = "flex";
    loadingIndicator.style.display = "block";
    frame.src = url;

    // HIDE LOADING INDICATOR ON LOAD
    frame.onload = () => {
        loadingIndicator.style.display = "none";
    };
    
    // FIND BUTTON DATA and update recent games/title (keep this logic)
    let btn = [...document.querySelectorAll(".game-buttons button")]
                .find(b => b.getAttribute("data-url") === url);

    if (btn) {
        let name = btn.innerText.trim().replace(/^Launch_/, '').replace(/_/g, ' ').trim();
        let img = btn.querySelector("img")?.src;

        addRecentGame(name, url, img);

        // UPDATE TOP BAR TITLE
        document.getElementById("gameTitle").innerText = name;
    }
}

      document.body.classList.remove("system-cursor"); // Re-enable custom cursor

document.getElementById("fullScreenBtn").onclick = () => {
  let frame = document.getElementById("gameFrame");

  if (!document.fullscreenElement) {
    frame.requestFullscreen().catch(err => console.log(err));
  } else {
    document.exitFullscreen();
  }

// --- SEARCH & FILTER LOGIC ---
const searchBar = document.getElementById("searchBar");
const noResultsMessage = document.getElementById("noResultsMessage");

function filterGames() {
  let search = searchBar.value.toLowerCase();
  let activeCategory = document.querySelector("#categoryFilters button.active")?.getAttribute("data-filter") || 'all';
  let visibleCount = 0;

  document.querySelectorAll("#allGamesGrid button").forEach(btn=>{
    // Get text content excluding the star icon's content '⭐'
    const textContent = btn.innerText.toLowerCase().replace('⭐', ''); 
    const category = btn.getAttribute("data-category");
    
    // Check search term
    const matchesSearch = textContent.includes(search);

    // Check category filter
    const matchesCategory = activeCategory === 'all' || category === activeCategory;

    if (matchesSearch && matchesCategory) {
      btn.style.display = ""; // Show
      visibleCount++;
    } else {
      btn.style.display = "none"; // Hide
    }
  });

  // Display 'No Results' message
  noResultsMessage.style.display = (visibleCount === 0 && (search.length > 0 || activeCategory !== 'all')) ? "block" : "none";
}

function filterByCategory(category, element) {
    // Update active filter button
    document.querySelectorAll('#categoryFilters button').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    
    // Set data-filter on the button that was clicked.
    element.setAttribute('data-filter', category);

    // Re-filter the games
    filterGames();
}


// RANDOM PICK
function openRandomGame(){
  let visible = [...document.querySelectorAll("#allGamesGrid button")].filter(b=>b.style.display!="none");
  if (visible.length > 0) {
    // Trigger the click event, which now calls showGameDetails
    visible[Math.floor(Math.random()*visible.length)]?.click(); 
  }
}


// --- RECENTLY PLAYED LOGIC ---
function addRecentGame(name, url, img) {
  let recent = JSON.parse(localStorage.getItem("recentGames") || "[]");

  // Remove duplicates
  recent = recent.filter(g => g.url !== url);

  // Add to top
  recent.unshift({ name, url, img });

  // Limit to 10 games
  recent = recent.slice(0, 10);

  localStorage.setItem("recentGames", JSON.stringify(recent));
  initializeGameGrids(); // Refresh grids
}

function displayRecentGames() {
  let recent = JSON.parse(localStorage.getItem("recentGames") || "[]");
  let container = document.getElementById("recentlyPlayed");
  let header = document.getElementById("recentlyPlayedHeader");
  
  if (recent.length === 0) {
    container.innerHTML = "";
    header.classList.remove("visible");
  } else {
    header.classList.add("visible");
    container.innerHTML = recent.map(g => {
        // Find the original game button for category
        const button = [...document.querySelectorAll("#allGamesGrid button")].find(b => b.getAttribute('data-url') === g.url);
        const category = button ? button.getAttribute('data-category') : 'casual'; 
        
        // MODIFIED: onclick calls showGameDetails()
        return `
          <button onclick="showGameDetails('${g.url}')" data-category="${category}" data-url="${g.url}">
            <div class="favorite-btn" data-url="${g.url}" onclick="toggleFavorite(event, '${g.url}')">⭐</div>
            <img src="${g.img}">
            ${g.name}
          </button>
        `;
    }).join("");
    // Re-initialize favorite buttons for the newly rendered list
    initializeFavoriteButtons();
  }
}

function clearRecentGames() {
  localStorage.removeItem("recentGames");
  initializeGameGrids(); // Refresh grids
  alert("Recently Played list cleared!");
}

// --- FAVORITES LOGIC ---

// Helper to get all favorite games URLs from local storage
function getFavoriteGames() {
  return JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]");
}

// Helper to save favorite games to local storage
function saveFavoriteGames(favorites) {
  localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
}

function toggleFavorite(event, url) {
    // Stop the click from propagating to the parent button's onclick (which shows details)
    event.stopPropagation();

    let favorites = getFavoriteGames();
    const isFavorite = favorites.includes(url);
    
    if (isFavorite) {
        // Remove from favorites
        favorites = favorites.filter(u => u !== url);
    } else {
        // Add to favorites
        favorites.push(url);
    }

    saveFavoriteGames(favorites);
    
    // Refresh both grids and all star icons
    initializeGameGrids();
}

function displayFavoriteGames() {
    let favorites = getFavoriteGames();
    let container = document.getElementById("favoriteGames");
    let header = document.getElementById("favoritesHeader");
    
    if (favorites.length === 0) {
        container.innerHTML = "";
        header.classList.remove("visible");
        return;
    } 
    
    header.classList.add("visible");
    
    // Get all game data from the main grid
    const allGameButtons = document.querySelectorAll("#allGamesGrid button");
    
    container.innerHTML = favorites.map(url => {
        // Find the original button using the data-url attribute
        const originalBtn = [...allGameButtons].find(b => b.getAttribute('data-url') === url);

        if (originalBtn) {
            // Reconstruct the favorite button using data from the original button
            const category = originalBtn.getAttribute('data-category');
            const img = originalBtn.querySelector("img")?.src;
            // Extract name from innerText
            const name = originalBtn.innerText.trim().replace(/^Launch_/, '').replace(/_/g, ' ').trim();
            
            // MODIFIED: onclick calls showGameDetails()
            return `
              <button onclick="showGameDetails('${url}')" data-category="${category}" data-url="${url}">
                <div class="favorite-btn active" data-url="${url}" onclick="toggleFavorite(event, '${url}')">⭐</div> 
                <img src="${img}">
                ${name}
              </button>
            `;
        }
        return ''; // Skip if original button not found
    }).join("");
    // Re-initialize favorite buttons for the newly rendered list
    initializeFavoriteButtons();
}

// Function to attach the favorite button and set its initial state for ALL buttons
function initializeFavoriteButtons() {
    const favorites = getFavoriteGames();
    // Select all game buttons in the main grid, recent list, and favorites list
    const allGameButtons = document.querySelectorAll(".game-buttons button");
    
    allGameButtons.forEach(button => {
        const url = button.getAttribute('data-url');
        if (!url) return; // Skip if no URL found

        // Find existing star button 
        let starBtn = button.querySelector('.favorite-btn');
        
        if (!starBtn) {
             // Create the star button dynamically if it wasn't added by displayFavoriteGames/displayRecentGames
             starBtn = document.createElement('div');
             starBtn.className = 'favorite-btn';
             starBtn.innerHTML = '⭐';
             starBtn.setAttribute('data-url', url);
             starBtn.setAttribute('onclick', `toggleFavorite(event, '${url}')`);
             
             // Insert at the beginning of the button's content
             button.prepend(starBtn);
        }

        // Set initial state (applies to all lists)
        if (favorites.includes(url)) {
            starBtn.classList.add('active');
        } else {
            starBtn.classList.remove('active');
        }
    });
}

function clearFavoriteGames() {
    localStorage.removeItem(FAVORITES_KEY);
    initializeGameGrids();
    alert("Favorite Games list cleared!");
}

// Main function to initialize all game grids
function initializeGameGrids() {
    displayFavoriteGames();
    displayRecentGames();
    // initializeFavoriteButtons is called inside both display functions for generated buttons,
    // but we call it here last to ensure the main grid buttons get their star added/updated.
    initializeFavoriteButtons(); 
    filterGames(); // Also run a filter check in case search bar has content
}


// --- THEME & SETTINGS LOGIC ---

// NEW FUNCTION: Save the custom panic URL
function savePanicUrl() {
    const input = document.getElementById("panicUrlInput");
    let newUrl = input.value.trim();

    // Simple validation: ensure it looks like a URL, add https:// if missing
    if (newUrl && !newUrl.startsWith("http")) {
        newUrl = "https://" + newUrl;
    }
    
    // If the input is empty, reset to default
    if (!newUrl) {
      newUrl = DEFAULT_PANIC_URL;
    }
    
    localStorage.setItem(PANIC_URL_KEY, newUrl);
    currentPanicURL = newUrl; // Update global variable immediately
    input.value = newUrl; // Update input field with standardized URL
    
    alert("Panic URL saved successfully to: " + newUrl);
}

// Function to toggle the custom cursor
function toggleCustomCursor() {
    const isCurrentlyEnabled = localStorage.getItem("customCursorEnabled") !== "false";
    const newState = !isCurrentlyEnabled;
    
    // Apply state
    if (newState) {
        document.body.classList.remove("system-cursor");
    } else {
        document.body.classList.add("system-cursor");
    }
    
    // Save state
    localStorage.setItem("customCursorEnabled", newState ? "true" : "false");

    // Update button text
    const toggleBtn = document.getElementById("cursorToggleBtn");
    if (toggleBtn) {
        toggleBtn.innerText = newState ? "Disable" : "Enable";
    }
}

// NEW: Function to initialize cursor state from local storage
function initializeCursorState() {
    // Default is true. Only explicitly disable if saved as "false".
    const isEnabled = localStorage.getItem("customCursorEnabled") !== "false"; 
    
    if (isEnabled) {
        document.body.classList.remove("system-cursor");
    } else {
        document.body.classList.add("system-cursor");
    }
}


// Helper function to convert hex to RGB
function hexToRgb(hex) {
    // Expand shorthand form (e.g. "03F") to full form (e.g. "0033FF")
    const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
    hex = hex.replace(shorthandRegex, function(m, r, g, b) {
        return r + r + g + g + b + b;
    });

    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
    } : null;
}

function setTheme(hexColor){
  let rgb = hexToRgb(hexColor);
  
  // If conversion fails, default to green and stop
  if (!rgb) {
    hexColor = "#00ff00";
    rgb = {r: 0, g: 255, b: 0};
  } 

  const glowRgba = `rgba(${rgb.r},${rgb.g},${rgb.b},0.4)`; // 40% opacity for glow

  document.documentElement.style.setProperty("--accent", hexColor);
  document.documentElement.style.setProperty("--bgGlow", glowRgba);

  // Save selected theme (now a hex code)
  localStorage.setItem("themeColor", hexColor);
}

function setMatrixSpeed(delay) {
    clearInterval(matrixInterval);
    localStorage.setItem("matrixSpeed", delay);

    if (delay != 1000) { // 1000ms = "Off"
        matrixInterval = setInterval(drawMatrix, parseInt(delay));
    }
}

// Set Matrix Text Type
function setMatrixText(type) {
    localStorage.setItem("matrixTextType", type);
    initializeMatrix(); // Re-initializes the matrix with new settings
}

function toggleSettingsModal() {
    const modal = document.getElementById("settingsModal");
    // Reload state when opening
    if (modal.style.display !== "block") {
      // Load saved hex color or default green
      document.getElementById("themeColorPicker").value = localStorage.getItem("themeColor") || "#00ff00"; 
      document.getElementById("matrixSpeed").value = localStorage.getItem("matrixSpeed") || "45";
      // Load and set the matrix text type value
      document.getElementById("matrixText").value = localStorage.getItem("matrixTextType") || "binary";
      
      // Load and set custom cursor state text on button
      const isCursorEnabled = localStorage.getItem("customCursorEnabled") !== "false";
      document.getElementById("cursorToggleBtn").innerText = isCursorEnabled ? "Disable" : "Enable";
      
      // NEW: Load panic URL into input
      document.getElementById("panicUrlInput").value = currentPanicURL;

    }
    modal.style.display = modal.style.display === "block" ? "none" : "block";
}


// --- MATRIX RAIN SETUP ---
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");


canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(0);


function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);


  // Use computed style property for dynamic color change
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
  ctx.font = fontSize + "px monospace";


  for(let i=0;i<drops.length;i++){
    // Use the dynamically set currentLetters
    let text = currentLetters[Math.floor(Math.random()*currentLetters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);


    if(drops[i] * fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}


window.onresize = ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
};

// Function to load settings and start the matrix
function initializeMatrix() {
    const type = localStorage.getItem("matrixTextType") || 'binary';
    currentLetters = (type === 'kanji') ? KANJI_CHARS : BINARY_CHARS;
    
    // Re-starts the interval with the potentially new speed and new characters
    const savedSpeed = localStorage.getItem("matrixSpeed") || "45"; 
    setMatrixSpeed(savedSpeed);
}


// Load on page start
window.addEventListener("DOMContentLoaded", () => {
  // Load the panic URL first
  currentPanicURL = localStorage.getItem(PANIC_URL_KEY) || DEFAULT_PANIC_URL;

  // Theme Loading Logic
  let savedColor = localStorage.getItem("themeColor") || "#00ff00"; // default green hex
  setTheme(savedColor); // Use the color hex directly

  // Matrix Initialization (handles speed and character set)
  initializeMatrix();
  
  // Game Grid Initialization (handles Recents and Favorites)
  initializeGameGrids();
  
  // Custom Cursor Initialization
  initializeCursorState();
});
