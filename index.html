<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UBG-Village-Pro</title>
<link rel="icon" type="image/png" href="icon128.png">

<style>
  /* --- CUSTOM PROPERTIES & ACCENTS --- */
  :root {
    --accent: #00ff00;
    --bgGlow: rgba(0,255,0,0.3);
    --dark-bg: #0a0a0a;
    --card-bg: rgba(0,255,0,0.05); /* Lighter background for game cards */
  }

  /* --- BASE & UTILITY --- */
  body {
    margin: 0;
    background: var(--dark-bg);
    color: white;
    font-family: 'Consolas', 'Monospace', sans-serif; /* Hacker-style font */
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  /* DARK OVERLAY (IMPROVE READABILITY) */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: -1;
  }
  
  /* MATRIX CANVAS */
  #matrix {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -2; /* Put behind the overlay */
  }
  
  /* --- NAVIGATION BAR --- */
  #navbar {
    position: sticky;
    top: 0;
    width: 98%;
    background: rgba(0, 0, 0, 0.9);
    border-bottom: 2px solid var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 30px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    z-index: 1000;
  }

  #navbar-title {
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
    text-shadow: 0 0 5px var(--bgGlow);
  }

  #navbar-links button, #navbar-links a {
    background: none;
    border: none;
    color: var(--accent);
    padding: 8px 15px;
    margin-left: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.2s, text-shadow 0.2s;
  }
  
  #navbar-links button:hover, #navbar-links a:hover {
    color: white;
    text-shadow: 0 0 8px var(--accent);
  }
  
  /* --- SPLASH SCREEN --- */
  #splashScreen {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
    /* Ensure splash screen is visible initially */
    display: flex; 
  }
  
  #splashScreen h1 {
    font-size: 6em;
    color: var(--accent);
    text-shadow: 0 0 20px var(--bgGlow);
    margin-bottom: 0.1em;
  }
  
  #splashScreen p {
    font-size: 1.5em;
    color: #ccc;
    line-height: 1.5;
    margin-top: 0;
  }

  /* --- MAIN CONTENT & GAME GRID --- */
  #mainContent {
    max-width: 1200px;
    margin: 20px auto;
    padding: 30px;
    display: none; /* Initially hidden, shown by showMainContent() */
  }

  .site-logo {
    display: block;
    margin: 0 auto 15px;
    width: 400px;
    max-width: 90%;
    height: auto;
    filter: drop-shadow(0 0 10px var(--accent));
  }
  
  #recentlyPlayedHeader {
    opacity: 0;
    transition: opacity 0.3s ease;
    color: var(--accent);
  }
  
  #recentlyPlayedHeader.visible {
    opacity: 1;
  }

  #randomGameBtn {
    background: var(--dark-bg);
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 10px var(--bgGlow);
    transition: 0.2s;
  }

  #randomGameBtn:hover {
    background: var(--card-bg);
    box-shadow: 0 0 15px var(--bgGlow);
  }

  #searchBar {
    width: 100%;
    max-width: 420px;
    display: block;
    margin: 20px auto;
    padding: 12px;
    border-radius: 10px;
    font-size: 16px;
    border: 2px solid var(--accent);
    outline: none;
    text-align: center;
    background: rgba(0,0,0,0.9);
    color: white;
    transition: 0.2s;
    box-shadow: 0 0 8px var(--bgGlow);
  }

  .game-buttons {
    display: grid;
    /* MODIFIED: Set to exactly 5 columns with equal width on large screens */
    grid-template-columns: repeat(5, 1fr); 
    gap: 20px;
    margin-top: 25px;
  }

  .game-buttons button {
    background: var(--card-bg);
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 15px 10px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    font-weight: 600;
    box-shadow: 0 0 8px var(--bgGlow);
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 150px;
  }

  .game-buttons button:hover {
    background: rgba(0, 255, 0, 0.15);
    box-shadow: 0 0 15px var(--bgGlow);
    transform: translateY(-2px);
  }

  .game-buttons img {
    width: 64px;
    height: 64px;
    display: block;
    margin-bottom: 8px;
    border-radius: 8px;
    object-fit: cover;
  }
  
  /* GAME OVERLAY */
  #gameOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    display: none;
    flex-direction: column;
    z-index: 9999;
  }

  #topBar { /* Game Overlay Top Bar */
    width: 98%;
    height: 50px;
    background: #111;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 15px;
    border-bottom: 2px solid var(--accent);
  }

  #topBar button {
    background: black;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 8px 14px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
  }

  #topBar button:hover {
    background: var(--accent);
    color: black;
  }
  
  #gameFrame {
    width: 100%;
    height: calc(100vh - 82px); /* Adjusted height for the topBar */
    border: none;
  }
  
  #themeSelect {
    background:var(--dark-bg);
    color:var(--accent);
    border:2px solid var(--accent);
    border-radius:8px;
    padding:6px;
  }

  /* MEDIA QUERIES for smaller screens */
  @media (max-width: 768px) {
    #navbar {
      padding: 10px 15px;
      flex-direction: column;
    }
    #navbar-links {
      margin-top: 10px;
    }
    #navbar-title {
      font-size: 20px;
    }
    #splashScreen h1 {
      font-size: 4em;
    }
    #splashScreen p {
      font-size: 1.2em;
    }
    .game-buttons {
      /* Scales down grid for mobile */
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
    }
  }

</style>
</head>

<script>
// --- PAGE NAVIGATION LOGIC ---
function showMainContent() {
  document.getElementById("splashScreen").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
}

function openGame(url) {
  // EXCLUSIONS (OPEN NORMALLY)
  if (
    url.includes("discord.gg") ||
    url.includes("discord.com") ||
    url.includes("chatroom.html") ||
    url.includes("docs.google.com")
  ) {
    window.open(url, "_blank");
    return;
  }

  // OPEN EVERYTHING ELSE IN OVERLAY
  let overlay = document.getElementById("gameOverlay");
  let frame = document.getElementById("gameFrame");

  overlay.style.display = "flex";
  frame.src = url;

  // FIND BUTTON DATA
  let btn = [...document.querySelectorAll("#allGamesGrid button, #recentlyPlayed button")]
              .find(b => b.getAttribute("onclick")?.includes(url));

  if (btn) {
    // Clean up the button text to just get the name (e.g., 'Launch_GameName' -> 'GameName')
    let name = btn.innerText.trim().replace(/^Launch_/, '').replace(/_/g, ' ');
    let img = btn.querySelector("img")?.src;

    addRecentGame(name, url, img);

    // UPDATE TOP BAR TITLE
    document.getElementById("gameTitle").innerText = name;
  }
}


// --- EXISTING GAME/OVERLAY LOGIC (RETAINED) ---

// CLOSE GAME
document.getElementById("closeGame").onclick = () => {
  document.getElementById("gameOverlay").style.display = "none";
  document.getElementById("gameFrame").src = "";
  document.getElementById("gameTitle").innerText = "No game";
};

// FULLSCREEN TOGGLE
document.getElementById("fullScreenBtn").onclick = () => {
  let frame = document.getElementById("gameFrame");

  if (!document.fullscreenElement) {
    frame.requestFullscreen().catch(err => console.log(err));
  } else {
    document.exitFullscreen();
  }
};


// SEARCH FILTER
const searchBar = document.getElementById("searchBar");
function filterGames() {
  let search = searchBar.value.toLowerCase();
  document.querySelectorAll("#allGamesGrid button, #recentlyPlayed button").forEach(btn=>{
    // **FIX FOR GRID LAYOUT**: Clear the inline display style ("") instead of setting it to "block"
    // This allows the CSS grid (display: grid) to take over and show the buttons in a 5-column layout.
    btn.style.display = btn.textContent.toLowerCase().includes(search) ? "" : "none";
  });
}


// RANDOM PICK
function openRandomGame(){
  let visible = [...document.querySelectorAll("#allGamesGrid button")].filter(b=>b.style.display!="none");
  if (visible.length > 0) {
    visible[Math.floor(Math.random()*visible.length)]?.click();
  }
}

// SAVE RECENTLY PLAYED
function addRecentGame(name, url, img) {
  let recent = JSON.parse(localStorage.getItem("recentGames") || "[]");

  // Remove duplicates
  recent = recent.filter(g => g.url !== url);

  // Add to top
  recent.unshift({ name, url, img });

  // Limit to 10 games
  recent = recent.slice(0, 10);

  localStorage.setItem("recentGames", JSON.stringify(recent));
  displayRecentGames();
}

// DISPLAY RECENTLY PLAYED
function displayRecentGames() {
  let recent = JSON.parse(localStorage.getItem("recentGames") || "[]");
  let container = document.getElementById("recentlyPlayed");
  let header = document.getElementById("recentlyPlayedHeader");
  let clearBtn = document.getElementById("clearRecentBtn");

  if (recent.length === 0) {
    container.innerHTML = "";
    clearBtn.style.display = "none";
    header.classList.remove("visible");
    container.style.marginBottom = "10px";
  } else {
    container.innerHTML = recent.map(g => `
      <button onclick="openGame('${g.url}')">
        <img src="${g.img}">
        ${g.name}
      </button>
    `).join("");
    clearBtn.style.display = "inline-block";
    header.classList.add("visible");
    container.style.marginBottom = "80px";
  }
}


// Load on page start
window.addEventListener("DOMContentLoaded", () => {
  // Theme Loading Logic
  let savedTheme = localStorage.getItem("theme") || "green"; // default green
  setTheme(savedTheme);
  document.getElementById("themeSelect").value = savedTheme;

  // Recent Games Logic
  displayRecentGames();
});

// CLEAR RECENTLY PLAYED
document.getElementById("clearRecentBtn").onclick = () => {
  localStorage.removeItem("recentGames");
  displayRecentGames();
};


// --- THEME LOGIC (RETAINED) ---
const themes = {
  green:  { accent:"#00ff00", glow:"rgba(0,255,0,0.4)" },
  blue:   { accent:"#00ffff", glow:"rgba(0,200,255,0.4)" },
  red:    { accent:"#ff0033", glow:"rgba(255,0,0,0.4)" },
  purple: { accent:"#b700ff", glow:"rgba(190,0,255,0.4)" },
  gold:   { accent:"#ffcc00", glow:"rgba(255,204,0,0.4)" }
};

function setTheme(name){
  let t = themes[name];
  if(!t) return;

  document.documentElement.style.setProperty("--accent", t.accent);
  document.documentElement.style.setProperty("--bgGlow", t.glow);

  // Save selected theme
  localStorage.setItem("theme", name);
}


// --- MATRIX RAIN SETUP (RETAINED) ---
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");


canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(0);


function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);


  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
  ctx.font = fontSize + "px monospace";


  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);


    if(drops[i] * fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}


setInterval(drawMatrix, 33);


window.onresize = ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
};
</script>
