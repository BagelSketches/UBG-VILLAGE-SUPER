<style>
  <style>
#recentlyPlayedHeader {
  opacity: 0;              /* hidden by default */
  transition: opacity 0.3s ease; /* smooth fade */
}

#recentlyPlayedHeader.visible {
  opacity: 1;              /* fully visible */
}



  /* RECENTLY PLAYED HEADER */
#recentlyPlayedHeader {
  color: var(--accent);
  transition: 0.2s;
}

  :root {
  --accent: #00ff00;
  --bgGlow: rgba(0,255,0,0.3);
}

/* APPLY TO BUTTONS */
button {
  border-color: var(--accent) !important;
  color: var(--accent) !important;
  box-shadow: 0 0 10px var(--bgGlow) !important;
}

/* GAME BUTTON HOVER */
.game-buttons button:hover {
  background: var(--bgGlow) !important;
}

/* HEADER LINE */
#topBar {
  border-bottom-color: var(--accent) !important;
}

/* SELECT THEME DROPDOWN */
#themeSelect {
  background:black;
  color:var(--accent);
  border:2px solid var(--accent);
  border-radius:8px;
  padding:6px;
}


  #recentlyPlayed {
  margin-bottom: 80px; /* adjust spacing */
}

#recentlyPlayed button {
  background: rgba(0, 255, 0, 0.1);
  border: 1px solid lime;
}

#recentlyPlayed button:hover {
  background: rgba(0, 255, 0, 0.3);
}


  /* GAME OVERLAY */
#gameOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 9999;
}

/* TOP BAR */
#topBar {
  width: 98%;
  height: 50px;
  background: #111;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 15px;
  border-bottom: 2px solid #00ff00;
}

/* THEME-DEPENDENT ELEMENTS */
#topBar button {
  background: black;
  color: var(--accent);
  border: 2px solid var(--accent);
  padding: 8px 14px;
  border-radius: 15px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.2s;
}

#topBar button:hover {
  background: var(--accent);
  color: black;
}

/* GAME FRAME */
#gameFrame {
  width: 100%;
  height: calc(100vh - 50px);
  border: none;
}


  .site-logo {
  display: block;
  margin: 0 auto 15px;
  width: 400px;     /* change size if needed */
  max-width: 90%;
  height: auto;
  filter: drop-shadow(0 0 10px #00ff00); /* optional glow */
}

 
  /* DARK OVERLAY TO IMPROVE READABILITY */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55); /* adjust 0.45–0.7 for brightness control */
  z-index: -1;
}


 
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}


/* MATRIX CANVAS */
#matrix {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: -1;
}


/* CONTENT */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 30px;
  position: relative;
}


h1 {
  text-align: center;
  color: #04cb51;
}


/* SEARCH BAR */
#searchBar {
  width: 100%;
  max-width: 420px;
  display: block;
  margin: 20px auto;
  padding: 12px;
  border-radius: 10px;
  font-size: 16px;
  border: 2px solid var(--theme-color);
  outline: none;
  text-align: center;
  background: rgba(0,0,0,0.9);
  color: white;
  transition: 0.2s;
}



/* RANDOM BUTTON */
#randomGameBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: black;
  color: lime;
  border: 2px solid lime;
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
}


.game-buttons button {
  background: rgba(0, 200, 255, 0.15);
  color: #eaffff;
  border: 2px solid #00ffff;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  font-weight: 600;
  box-shadow: 0 0 10px rgba(0,255,255,0.6);
  text-shadow: 0 0 6px rgba(0,255,255,0.6);
  transition: 0.2s;
}


.game-buttons button:hover {
  background: rgba(0,255,255,0.5);
  box-shadow: 0 0 18px rgba(0,255,255,0.9);
}


/* GAME GRID */
.game-buttons {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 20px;
  margin-top: 25px;
}


.game-buttons button {
  background: rgba(0, 0, 0, 0.15);
  color: rgb(0, 201, 67);
  border: 1px solid rgb(0, 155, 67);
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
}


.game-buttons button:hover {
  background: rgba(0,255,255,0.3);
}


.game-buttons img {
  width: 96px;
  height: 96px;
  display: block;
  margin: auto;
  margin-bottom: 8px;
}
</style>

</div>

<script>
function openGame(url) {

  // ALLOW DISCORD TO OPEN NORMALLY
  if (url.includes("discord.gg") || url.includes("discord.com")) {
    window.open(url, "_blank");
    return;
  }

  // OPEN EVERYTHING ELSE IN OVERLAY
  document.getElementById("gameOverlay").style.display = "flex";
  document.getElementById("gameFrame").src = url;

  // find button information
  let btn = [...document.querySelectorAll(".game-buttons button")]
              .find(b => b.getAttribute("onclick") === `openGame('${url}')`);

  if (btn) {
  let name = btn.innerText.trim();
  let img = btn.querySelector("img").src;
  addRecentGame(name, url, img);

  // Update top bar game title
  document.getElementById("gameTitle").innerText = name;
}



// CLOSE GAME
document.getElementById("closeGame").onclick = () => {
  document.getElementById("gameOverlay").style.display = "none";
  document.getElementById("gameFrame").src = "";
  document.getElementById("gameTitle").innerText = "No game"; // reset
};

  
};

// FULLSCREEN TOGGLE
document.getElementById("fullScreenBtn").onclick = () => {
  let frame = document.getElementById("gameFrame");

  if (!document.fullscreenElement) {
    frame.requestFullscreen().catch(err => console.log(err));
  } else {
    document.exitFullscreen();
  }
};


// SEARCH FILTER
function filterGames() {
  let search = searchBar.value.toLowerCase();
  document.querySelectorAll(".game-buttons button").forEach(btn=>{
    btn.style.display = btn.textContent.toLowerCase().includes(search) ? "block" : "none";
  });
}


// RANDOM PICK
function openRandomGame(){
  let visible = [...document.querySelectorAll(".game-buttons button")].filter(b=>b.style.display!="none");
  visible[Math.floor(Math.random()*visible.length)]?.click();
}

// SAVE RECENTLY PLAYED
function addRecentGame(name, url, img) {
  let recent = JSON.parse(localStorage.getItem("recentGames") || "[]");

  // Remove duplicates
  recent = recent.filter(g => g.url !== url);

  // Add to top
  recent.unshift({ name, url, img });

  // Limit to 10 games
  recent = recent.slice(0, 10);

  localStorage.setItem("recentGames", JSON.stringify(recent));
  displayRecentGames();
}

// DISPLAY RECENTLY PLAYED
function displayRecentGames() {
  let recent = JSON.parse(localStorage.getItem("recentGames") || "[]");
  let container = document.getElementById("recentlyPlayed");
  let clearBtn = document.getElementById("clearRecentBtn");

  // Hide button if no recent games
  if (recent.length === 0) {
    container.innerHTML = "";  // clear container
    clearBtn.style.display = "none";  // hide button
    container.style.marginBottom = "10px"; // smaller gap when empty
  } else {
    container.innerHTML = recent.map(g => `
      <button onclick="openGame('${g.url}')">
        <img src="${g.img}">
        ${g.name}
      </button>
    `).join("");
    clearBtn.style.display = "inline-block"; // show button
    container.style.marginBottom = "80px"; // normal gap
  }
}



// Load on page start
displayRecentGames();

// CLEAR RECENTLY PLAYED
document.getElementById("clearRecentBtn").onclick = () => {
  localStorage.removeItem("recentGames");
  displayRecentGames();
};




// MATRIX RAIN SETUP
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");


canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(0);


function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);


 ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
 ctx.font = fontSize + "px monospace";


  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);


    if(drops[i] * fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}


setInterval(drawMatrix, 33);


window.onresize = ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
};
const themes = {
  green:  { accent:"#00ff00", glow:"rgba(0,255,0,0.4)" },
  blue:   { accent:"#00ffff", glow:"rgba(0,200,255,0.4)" },
  red:    { accent:"#ff0033", glow:"rgba(255,0,0,0.4)" },
  purple: { accent:"#b700ff", glow:"rgba(190,0,255,0.4)" },
  gold:   { accent:"#ffcc00", glow:"rgba(255,204,0,0.4)" }
};

// SET THEME
function setTheme(name){
  let t = themes[name];
  if(!t) return;

  document.documentElement.style.setProperty("--accent", t.accent);
  document.documentElement.style.setProperty("--bgGlow", t.glow);

  // Save selected theme
  localStorage.setItem("theme", name);
}

// LOAD THEME ON START
window.addEventListener("DOMContentLoaded", () => {
  let savedTheme = localStorage.getItem("theme") || "green"; // default green
  setTheme(savedTheme);

  // Also update the dropdown to match saved theme
  document.getElementById("themeSelect").value = savedTheme;
});

if (recent.length === 0) {
    container.style.marginBottom = "10px";
    document.getElementById("searchBar").style.marginTop = "10px";
} else {

}
